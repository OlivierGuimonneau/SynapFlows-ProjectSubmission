name: Deploy SynapFlows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        VPS_PATH: ${{ secrets.VPS_PATH }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: VPS_PATH
        script_stop: true
        script: |
          set -e
          
          # On utilise la variable d'environnement $VPS_PATH correctement passée
          cd $VPS_PATH || { echo "Dossier non trouvé"; exit 1; }
          
          echo "Pull depuis GitHub..."
          git pull origin main
          
          echo "Build image..."
          docker compose build --no-cache
          
          echo "Restart service..."
          docker compose up -d --force-recreate
          
          echo "Status..."
          docker compose ps
          
          echo "Logs..."
          docker compose logs synapflows --tail 15