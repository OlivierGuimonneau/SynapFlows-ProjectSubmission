version: '3.8'

services:
  synapflows:
    build: .
    container_name: synapflows-project
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - n8n-https_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.synapflows.rule=Host(`project.synapflows.fr`)"
      - "traefik.http.routers.synapflows.entrypoints=websecure"
      - "traefik.http.routers.synapflows.tls.certresolver=myresolver"
      - "traefik.http.services.synapflows.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  n8n-https_default:
    external: true